name: CI

on:
  push:
    branches: ["**"]
  pull_request:
    branches: ["**"]

# Cancel superseded runs on the same ref to save CI minutes
concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  # ──────────────────────────────────────────────────────────────
  # Backend: pytest against real Redis + DynamoDB Local
  # ──────────────────────────────────────────────────────────────
  backend-tests:
    name: Backend (pytest)
    runs-on: ubuntu-latest

    services:
      redis:
        image: redis:7-alpine
        ports:
          - 6379:6379
        options: >-
          --health-cmd "redis-cli ping"
          --health-interval 10s
          --health-timeout 3s
          --health-retries 5

      dynamodb:
        image: amazon/dynamodb-local:latest
        ports:
          - 8000:8000

    env:
      # DynamoDB Local — boto3 (>=1.31) honours AWS_ENDPOINT_URL_DYNAMODB.
      # Dummy credentials are required by boto3 even for the local emulator.
      AWS_ENDPOINT_URL_DYNAMODB: http://localhost:8000
      AWS_ACCESS_KEY_ID: dummy
      AWS_SECRET_ACCESS_KEY: dummy
      AWS_REGION: ap-south-1
      # Redis service wired above
      REDIS_ENABLED: "true"
      REDIS_URL: redis://localhost:6379/0
      # No real Bedrock calls in CI
      BEDROCK_MOCK_MODE: "true"
      DEV_MODE: "true"
      HOUSEHOLD_ID: hh_xk92p_sharma

    defaults:
      run:
        working-directory: backend

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip
          cache-dependency-path: backend/requirements.txt

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Create + seed DynamoDB Local tables
        run: python -c "from db.seed_dynamo import run_full_seed; run_full_seed()"

      - name: Run tests
        # The Twilio notification test requires live Twilio credentials and is
        # excluded from CI. Remove the --deselect once Twilio creds are wired
        # in as repository secrets.
        run: pytest -q --deselect tests/test_twilio_notification.py

  # ──────────────────────────────────────────────────────────────
  # Frontend: TypeScript type-check
  # ──────────────────────────────────────────────────────────────
  frontend-typecheck:
    name: Frontend (tsc)
    runs-on: ubuntu-latest

    defaults:
      run:
        working-directory: frontend

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: npm
          cache-dependency-path: frontend/package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Type-check
        # ADVISORY for now: there are pre-existing type errors in the onboarding
        # components (device-type literals + a missing store method). Once those
        # are fixed, remove `continue-on-error` to make this a required gate.
        continue-on-error: true
        run: npx tsc --noEmit
